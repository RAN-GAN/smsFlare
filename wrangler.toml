name = "smsflare"
main = "src/backend/index.js"
compatibility_date = "2024-05-10"
compatibility_flags = ["nodejs_compat"]

# Workers Observability — free tier allows 200k events/month
[observability]
enabled = true

# Environment configuration
[env.production]
name = "smsflare-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "smsflare"
database_id = "9e4dc7f9-2582-4c9b-b280-6a46ff00076d"

[env.staging]
name = "smsflare-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "smsflare"
database_id = "9e4dc7f9-2582-4c9b-b280-6a46ff00076d"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "smsflare"
database_id = "9e4dc7f9-2582-4c9b-b280-6a46ff00076d"

# Environment variables
[env.production.vars]
API_BASE_URL = ""
DASHBOARD_URL = ""
POLLING_INTERVAL = "30"
DEVICE_HEARTBEAT_INTERVAL = "600"

# NOTE: Set JWT_SECRET secret before deploying:
# wrangler secret put JWT_SECRET --env production

[env.staging.vars]
API_BASE_URL = ""
DASHBOARD_URL = ""
POLLING_INTERVAL = "30"
DEVICE_HEARTBEAT_INTERVAL = "600"

# NOTE: Set JWT_SECRET secret before deploying:
# wrangler secret put JWT_SECRET --env staging

