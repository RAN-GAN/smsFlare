name = "smsflare"
main = "src/backend/index.js"
compatibility_date = "2024-05-10"
compatibility_flags = ["nodejs_compat"]

# Environment configuration
[env.production]
name = "smsflare-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "smsflare"
database_id = "c3f500a9-6065-4aa2-9e85-cab6858a9261"

[env.staging]
name = "smsflare-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "smsflare"
database_id = "c3f500a9-6065-4aa2-9e85-cab6858a9261"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "smsflare"
database_id = "c3f500a9-6065-4aa2-9e85-cab6858a9261"

# Environment variables
[env.production.vars]
API_BASE_URL = ""
DASHBOARD_URL = ""
POLLING_INTERVAL = "30"
DEVICE_HEARTBEAT_INTERVAL = "600"

# NOTE: Set JWT_SECRET secret before deploying:
# wrangler secret put JWT_SECRET --env production

[env.staging.vars]
API_BASE_URL = ""
DASHBOARD_URL = ""
POLLING_INTERVAL = "30"
DEVICE_HEARTBEAT_INTERVAL = "600"

# NOTE: Set JWT_SECRET secret before deploying:
# wrangler secret put JWT_SECRET --env staging

